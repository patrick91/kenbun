name: Release

concurrency: release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  check-release:
    name: Check for release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      actions: read
      contents: read
    outputs:
      has_release: ${{ steps.release.outputs.has-release }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check for release file
        id: release
        run: |
          has_release=false

          if [ -f RELEASE.md ]; then
            has_release=true
          fi

          echo "has-release=$has_release" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: check-release
    if: needs.check-release.outputs.has_release == 'true'
    environment: release
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      attestations: write

    steps:
      # Check out the branch (not the detached head SHA) so autopub can push
      # the changelog + version-bump commit and the tag back to it.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: ./.github/actions/prepare-release
        with:
          enabled: "true"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: dist
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish release
        uses: autopub/autopub-action@5fdc82e84c048a82303de6b5c5a9d027665e73cf # v1.1.1
        with:
          command: publish
          autopub-version: "1.0.0a60"
          download-artifact: "false"
